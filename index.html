<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyaro's Sh0p - Product List</title>
    
    <style>
        /* CSS RESET & PODSTAWY */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #090a0c; 
            color: #e2e8f0; 
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* GŁÓWNY KONTENER */
        .page-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
        }

        /* NAGŁÓWEK (HERO) */
        .hero-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 60px 20px 40px 20px;
            border-bottom: 1px solid #1f2229;
            margin-bottom: 40px;
        }

        .hero-icon {
            width: 80px; 
            height: 80px;
            border-radius: 50%; 
            object-fit: cover;
            border: 2px solid #2d333b; 
            margin-bottom: 20px;
        }

        .hero-badge {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #f43f5e;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .hero-title {
            color: #ffffff;
            font-size: 46px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .hero-desc {
            font-size: 16px;
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .hero-ticket-btn {
            background-color: #e11d48;
            color: white;
            text-decoration: none; 
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .hero-ticket-btn:hover {
            background-color: #be123c;
            transform: translateY(-2px);
        }

        /* PASEK WYSZUKIWANIA (Odklejony od ekranu) */
        .search-toolbar {
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid #1f2229;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 14px 20px;
            font-size: 15px;
            border: 1px solid #2d333b;
            border-radius: 8px;
            background-color: #121418;
            color: white;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s ease;
            text-align: center;
        }

        .search-input:focus {
            border-color: #e11d48;
        }

        .tags-wrapper {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            font-family: inherit;
            background-color: transparent;
            color: #94a3b8;
            border: 1px solid #2d333b;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            color: #f8fafc;
            background-color: #1f2229;
        }

        /* Aktywne filtry */
        .filter-btn.active {
            background-color: #e11d48;
            color: white;
            border-color: #e11d48;
        }
        .filter-btn.btn-popular.active { background-color: #2d333b; color: #eab308; border-color: #eab308; }
        .filter-btn.btn-requested.active { background-color: #2d333b; color: #14b8a6; border-color: #14b8a6; }
        .filter-btn.btn-denuvo.active { background-color: #2d333b; color: #3b82f6; border-color: #3b82f6; }
        .filter-btn.btn-dlc.active { background-color: #2d333b; color: #22c55e; border-color: #22c55e; }
        .filter-btn.btn-special.active { background-color: #2d333b; color: #0ea5e9; border-color: #0ea5e9; }

        .counter-text {
            font-size: 13px;
            color: #64748b;
            margin-top: 16px;
            font-weight: 500;
        }

        /* SIATKA GIER */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            width: 100%;
        }

        .game-card {
            background-color: #121418;
            border-radius: 12px;
            border: 1px solid #22262e;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: #3e4552;
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            height: 320px;
            background-color: #1a1d24;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-badges {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 2;
        }

        .badge {
            font-family: 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background-color: rgba(9, 10, 12, 0.9);
            backdrop-filter: blur(4px);
        }

        .badge-popular { border: 1px solid #eab308; color: #eab308; }
        .badge-requested { border: 1px solid #14b8a6; color: #14b8a6; }
        .badge-denuvo { border: 1px solid #3b82f6; color: #3b82f6; }
        .badge-dlc { border: 1px solid #22c55e; color: #22c55e; }
        .badge-special { border: 1px solid #0ea5e9; color: #0ea5e9; }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1; 
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-requested {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 16px;
        }
        
        .card-requested strong {
            color: #cbd5e1;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto; 
            padding-bottom: 16px;
        }

        .stat-sold {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
        }

        .stat-status {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-in { color: #10b981; }
        .status-out { color: #ef4444; }

        /* PRZYCISK ZAKUPU (ZABLOKOWANY NA DOLE KARTY) */
        .card-buy-btn {
            width: 100%;
            background-color: transparent;
            color: #f8fafc;
            border: top;
            border-width: 1px 0 0 0;
            border-style: solid;
            border-color: #22262e;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .card-buy-btn:hover {
            background-color: #1f2229;
            color: #f43f5e;
        }

        .btn-price {
            font-weight: 800;
        }

        /* =========================================
           POWIĘKSZONE OKIENKO (MODAL NA ŚRODKU)
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            background-color: #0d0f12;
            padding: 30px; 
            border-radius: 12px;
            max-width: 750px; 
            width: 90%;
            text-align: left; 
            border: 1px solid #1f2229; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: modalFadeIn 0.2s ease;
        }

        @keyframes modalFadeIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content-flex {
            display: flex;
            gap: 25px; 
            align-items: flex-start; 
        }

        /* POWIĘKSZONY I ZABEZPIECZONY OBRAZEK */
        .modal-image {
            width: 160px; 
            height: 220px; 
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #1f2229;
            flex-shrink: 0; 
        }

        .modal-details {
            flex: 1; 
        }

        .modal-details h4 {
            margin: 0 0 10px 0;
            font-size: 26px;
            color: #f8fafc;
            line-height: 1.2;
        }

        .modal-details-desc {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-top: 15px;
            border-top: 1px solid #1f2229;
            padding-top: 15px;
        }
        
        .modal-details-desc strong {
            color: #cbd5e1;
        }

        .modal-features {
            list-style: none;
            padding: 0;
            margin: 15px 0 0 0;
            border-top: 1px solid #1f2229;
            padding-top: 15px;
        }

        .modal-features li {
            color: #10b981; 
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .modal-instructions {
            color: #64748b;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid #1f2229;
            padding-top: 20px;
            margin: 25px 0;
            line-height: 1.5;
        }

        .modal-close-container {
            text-align: center;
        }

        .modal-close-btn {
            background-color: #1f2229;
            color: #f8fafc;
            border: 1px solid #2d333b;
            padding: 10px 40px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .modal-close-btn:hover {
            background-color: #e11d48;
            border-color: #e11d48;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <div class="hero-section">
            <img src="https://i.pinimg.com/474x/a1/8d/23/a18d2348541eeb8ba8b75e7c4565928f.jpg" alt="Logo" class="hero-icon">
            <div class="hero-badge">Official Product List</div>
            <h1 class="hero-title">Hyaro's Sh0p</h1>
            <p class="hero-desc">Explore our premium collection of games. Safe, instant activation, and 24/7 support via Discord tickets.</p>
            <a href="https://discord.com/channels/1507375933819060404/1507375934733549695/1507426745752621198" class="hero-ticket-btn" target="_blank">
                🛒 Open a Ticket to Buy
            </a>
        </div>

        <div class="search-toolbar">
            <input type="text" id="wyszukiwarka" class="search-input" placeholder="Search for a game..." onkeyup="filtrujGry()">

            <div class="tags-wrapper">
                <button class="filter-btn btn-all active" onclick="ustawTag('all', this)">All</button>
                <button class="filter-btn btn-popular" onclick="ustawTag('popular', this)">⭐ Popular</button>
                <button class="filter-btn btn-requested" onclick="ustawTag('requested', this)">❤️ Requested</button>
                <button class="filter-btn btn-denuvo" onclick="ustawTag('denuvo', this)">🛡️ Denuvo</button>
                <button class="filter-btn btn-dlc" onclick="ustawTag('dlc', this)">🧩 DLC Activation</button>
                <button class="filter-btn btn-special" onclick="ustawTag('special', this)">💎 Special</button>
            </div>
            
            <span class="counter-text" id="licznikGier">Showing 0 games</span>
        </div>

        <div class="games-grid" id="kontenerGier"></div>

    </div>

    <!-- POWIĘKSZONE OKIENKO (MODAL) NA ŚRODKU -->
    <div class="modal-overlay" id="customAlert">
        <div class="modal-box">
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Bezpośrednie wczytanie pliku z tego samego folderu -->
    <script src="./lista-gier.js"></script>

    <script>
        let aktywnyTag = "all";

        function generujSklep() {
            const kontener = document.getElementById("kontenerGier");
            if (!kontener) return;
            kontener.innerHTML = ""; 

            bazaGier.sort((a, b) => b.soldCount - a.soldCount);

            bazaGier.forEach(gra => {
                let badgesWewnatrzHTML = "";
                if (gra.tags && gra.tags.length > 0) {
                    gra.tags.forEach(pojedynczyTag => {
                        if (konfiguracjaTagow[pojedynczyTag]) {
                            let u = konfiguracjaTagow[pojedynczyTag];
                            badgesWewnatrzHTML += `<div class="badge ${u.klasa}">${u.tekst}</div>`;
                        }
                    });
                }

                let pelnyBadgeContainer = "";
                if (badgesWewnatrzHTML !== "") {
                    pelnyBadgeContainer = `<div class="card-badges">${badgesWewnatrzHTML}</div>`;
                }

                let dostepnoscClass = gra.available === "Yes" ? "status-in" : "status-out";
                let dostepnoscTekst = gra.available === "Yes" ? "In Stock" : "Out of Stock";
                let napisRequestedHtml = gra.requestedBy ? `<div class="card-requested">Requested by: <strong>${gra.requestedBy}</strong></div>` : "";
                let wszystkieTagiJakoTekst = gra.tags ? gra.tags.join(',') : "";

                const karta = document.createElement("div");
                karta.className = "game-card";
                karta.setAttribute("data-tags", wszystkieTagiJakoTekst); 

                karta.innerHTML = `
                    <div class="card-image-wrapper">
                        ${pelnyBadgeContainer} 
                        <img src="${gra.image}" loading="lazy" alt="${gra.title}">
                    </div>
                    
                    <div class="card-body">
                        <h3 class="card-title">${gra.title}</h3>
                        ${napisRequestedHtml} 
                        
                        <div class="card-stats">
                            <span class="stat-sold">🛒 ${gra.soldCount} sold</span>
                            <span class="stat-status ${dostepnoscClass}">• ${dostepnoscTekst}</span>
                        </div>
                    </div>
                    
                    <button class="card-buy-btn" onclick="klikniecieCeny(${gra.id})">
                        <span class="btn-price">${gra.price}</span>
                        <span>— View Details</span>
                    </button>
                `;

                kontener.appendChild(karta);
            });

            filtrujGry();
        }

        function klikniecieCeny(idGry) {
            const gra = bazaGier.find(g => g.id === idGry);
            
            const modal = document.getElementById("customAlert");
            const modalBody = document.getElementById("modalBody");

            let statusColor = gra.available === "Yes" ? "#10b981" : "#ef4444";
            let statusText = gra.available === "Yes" ? "Available" : "Not Available";

            let listaZaletHTML = "";
            if (gra.features && gra.features.length > 0) {
                listaZaletHTML = `<ul class="modal-features">`;
                gra.features.forEach(cecha => {
                    listaZaletHTML += `<li>✔️ ${cecha}</li>`;
                });
                listaZaletHTML += `</ul>`;
            }

            modalBody.innerHTML = `
                <div class="modal-content-flex">
                    <img src="${gra.image}" class="modal-image" alt="${gra.title}">
                    
                    <div class="modal-details">
                        <h4>${gra.title}</h4>
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 5px;">
                            <span style="font-size: 26px; font-weight: 800; color: #e11d48;">${gra.price}</span>
                            <span style="color: ${statusColor}; font-weight: 600; font-size: 14px; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px;">• ${statusText}</span>
                        </div>
                        
                        <p class="modal-details-desc">
                            ${gra.description}
                        </p>
                        
                        ${listaZaletHTML}
                    </div>
                </div>
                
                <div class="modal-instructions">
                    To purchase this package, please open a ticket on our Discord server by clicking the <strong>'Create Ticket'</strong> button at the top of the page!
                </div>
                
                <div class="modal-close-container">
                    <button class="modal-close-btn" onclick="closeModal()">Close</button>
                </div>
            `;
            
            modal.style.display = "flex";
            document.body.style.overflow = "hidden"; 
        }

        function closeModal() {
            document.getElementById("customAlert").style.display = "none";
            document.body.style.overflow = "auto"; 
        }

        window.onclick = function(event) {
            const modal = document.getElementById("customAlert");
            if (event.target == modal) {
                closeModal();
            }
        }

        function ustawTag(tag, kliknietyPrzycisk) {
            aktywnyTag = tag;
            
            let przyciski = document.getElementsByClassName("filter-btn");
            for (let i = 0; i < przyciski.length; i++) {
                przyciski[i].classList.remove("active");
            }
            
            kliknietyPrzycisk.classList.add("active");
            
            filtrujGry();
        }

        function filtrujGry() {
            let wpisanyTekst = document.getElementById("wyszukiwarka").value.toLowerCase();
            let gry = document.getElementsByClassName("game-card");
            let licznikWidocznych = 0;

            for (let i = 0; i < gry.length; i++) {
                let tytulGier = gry[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
                
                let tagiGryString = gry[i].getAttribute("data-tags");
                let listaTagowTejGry = tagiGryString ? tagiGryString.split(',') : [];

                let pasujeTekst = tytulGier.includes(wpisanyTekst);
                let pasujeTag = (aktywnyTag === "all" || listaTagowTejGry.includes(aktywnyTag));

                if (pasujeTekst && pasujeTag) {
                    gry[i].style.display = "flex"; 
                    licznikWidocznych++;            
                } else {
                    gry[i].style.display = "none";  
                }
            }

            let tekstLicznika = "";
            if (aktywnyTag === "all") {
                tekstLicznika = "Showing " + licznikWidocznych + " product" + (licznikWidocznych !== 1 ? "s" : "");
            } else if (aktywnyTag === "special") {
                tekstLicznika = "Showing " + licznikWidocznych + " offer" + (licznikWidocznych !== 1 ? "s" : "");
            } else {
                tekstLicznika = "Showing " + licznikWidocznych + " game" + (licznikWidocznych !== 1 ? "s" : "");
            }

            document.getElementById("licznikGier").innerText = tekstLicznika;
        }

        window.onload = generujSklep;
    </script>

</body>
</html>
